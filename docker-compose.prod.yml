version: '3.9'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./cache:/app/cache
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: always
    command: python main.py dashboard --port 8000 --no-scanner

  scanner:
    build: .
    volumes:
      - ./cache:/app/cache
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: always
    command: python main.py scan --loop
